{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wishlink</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="logo" href="{% url 'wishlist_list' %}">Wishlink</a>

            <nav class="nav">
                {% if user.is_authenticated %}
                    <a href="{% url 'wishlist_list' %}">Мои вишлисты</a>
                    <a href="{% url 'profile' %}">Профиль</a>

                    <form action="{% url 'logout' %}" method="post" class="logout-form">
                        {% csrf_token %}
                        <button type="submit" class="nav-button">Выйти</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Войти</a>
                    <a href="{% url 'register' %}" class="nav-accent">Регистрация</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container page">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
